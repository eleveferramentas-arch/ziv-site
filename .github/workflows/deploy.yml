name: 🚀 Build and Deploy ZIV (SFTP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🏗️ Build & 📂 Deploy via SFTP
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🔍 Verify Build Output
        run: |
          echo "=== Conteúdo da pasta dist ==="
          ls -R ./dist

      - name: 📂 Deploy via SFTP (SSH)
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --verbose ./dist/ /home/u175636768/domains/tudoeleve.com.br/public_html/ziv-site/;
            quit
          " sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:65002
